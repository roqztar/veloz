<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloz Speed Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --veloz-red: #ef4444;
      --veloz-red-dark: #dc2626;
      --bg-dark: #0a0a0a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.08);
    }
    
    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%);
    }
    
    /* Glassmorphism Card */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--veloz-red) 0%, var(--veloz-red-dark) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    /* WPM Control */
    .wpm-control {
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .wpm-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .wpm-label span:first-child {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .wpm-value {
      font-weight: 700;
      color: var(--veloz-red);
      font-size: 16px;
      background: rgba(239, 68, 68, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    /* Custom Range Slider */
    .slider-container {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }
    
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--veloz-red) 0%, var(--veloz-red) var(--progress, 30%), rgba(255,255,255,0.1) var(--progress, 30%));
      outline: none;
      cursor: pointer;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      cursor: grab;
      border: 3px solid var(--veloz-red);
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.5);
    }
    
    input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
      transform: scale(1.05);
    }
    
    .wpm-range-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }
    
    /* Action Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .action-btn {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .action-btn:hover::before {
      opacity: 1;
    }
    
    .action-btn.primary {
      background: linear-gradient(135deg, var(--veloz-red) 0%, var(--veloz-red-dark) 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
    }
    
    .action-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }
    
    .action-btn.primary:active {
      transform: translateY(0);
    }
    
    .action-btn.secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .btn-icon {
      font-size: 16px;
    }
    
    /* Info Section */
    .info {
      padding: 16px;
      text-align: center;
    }
    
    .info-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    .keyboard-shortcut {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .key {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    
    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border) 50%, transparent 100%);
      margin: 16px 0;
    }
    
    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .stat-dot {
      width: 6px;
      height: 6px;
      background: var(--veloz-red);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    /* Text Input Section */
    .text-input-section {
      margin-bottom: 16px;
    }
    
    .input-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .text-input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .text-input:focus {
      outline: none;
      border-color: var(--veloz-red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    
    .text-input::placeholder {
      color: var(--text-muted);
    }
    
    .full-width {
      width: 100%;
      margin-top: 12px;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Loading/Error States */
    .status-message {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }
    
    .status-message.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: var(--veloz-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .status-message.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">V</div>
      <h1>Veloz</h1>
    </div>
    <p>Speed Reader Extension</p>
  </div>
  
  <div class="wpm-control glass-card">
    <div class="wpm-label">
      <span>Lesegeschwindigkeit</span>
      <span class="wpm-value" id="wpm-display">300 WPM</span>
    </div>
    <div class="slider-container">
      <input type="range" id="wpm-slider" min="100" max="1000" value="300" step="10">
    </div>
    <div class="wpm-range-labels">
      <span>100</span>
      <span>1000</span>
    </div>
  </div>
  
  <!-- Direct Text Input -->
  <div class="text-input-section">
    <label class="input-label">Text zum Lesen</label>
    <textarea 
      id="direct-text" 
      class="text-input" 
      placeholder="Text hier eingeben oder einfügen (Strg+V)..."
      rows="4"
    ></textarea>
    <button class="action-btn primary full-width" id="read-direct">
      <span class="btn-icon">▶</span>
      <span>Text lesen</span>
    </button>
  </div>
  
  <div class="divider"></div>
  
  <div class="actions">
    <button class="action-btn secondary" id="read-selection">
      <span class="btn-icon">📄</span>
      <span>Ausgewählten Text lesen</span>
    </button>
    
    <button class="action-btn secondary" id="paste-text">
      <span class="btn-icon">📋</span>
      <span>Zwischenablage einfügen</span>
    </button>
  </div>
  
  <div class="info glass-card">
    <p class="info-text">
      Text auf einer Seite markieren und<br>
      <span class="keyboard-shortcut">
        <span class="key">Ctrl</span> + <span class="key">Shift</span> + <span class="key">R</span>
      </span>
      <br>drücken für sofortiges Lesen
    </p>
    <div class="divider"></div>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-dot"></span>
        <span>Bereit</span>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
