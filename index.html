<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/eyedance.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Eyedance</title>
    
    <!-- Security Headers -->
    <!-- Content Security Policy - Restricts sources of content -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob:;
      connect-src 'self' https://cdnjs.cloudflare.com;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
      require-trusted-types-for 'script';
      trusted-types default;
    ">
    
    <!-- X-Frame-Options - Prevents clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    
    <!-- X-Content-Type-Options - Prevents MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- Referrer-Policy - Controls referrer information -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- Permissions-Policy - Restricts browser features -->
    <meta http-equiv="Permissions-Policy" content="
      camera=(),
      microphone=(),
      geolocation=(),
      payment=(),
      usb=(),
      magnetometer=(),
      gyroscope=(),
      accelerometer=(),
      autoplay=(),
      display-capture=(),
      encrypted-media=(),
      fullscreen=(self),
      hid=(),
      idle-detection=(),
      interest-cohort=(),
      keyboard-map=(),
      midi=(),
      navigation-override=(),
      picture-in-picture=(),
      publickey-credentials-get=(),
      screen-wake-lock=(),
      serial=(),
      sync-script=(),
      sync-xhr=(self),
      web-share=(),
      xr-spatial-tracking=()
    ">
    
    <!-- Description -->
    <meta name="description" content="Eyedance - Ein Speed Reader für schnelleres Lesen mit RSVP-Technologie">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister all service workers to prevent caching issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </body>
</html>
